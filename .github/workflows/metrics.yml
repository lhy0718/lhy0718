name: GitHub Metrics

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"
  push:
    branches:
      - main
    paths:
      - .github/workflows/metrics.yml

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate profile metrics
        uses: lowlighter/metrics@latest
        with:
          # Use a Personal Access Token (PAT) stored as the GH_TOKEN secret.
          # Required scopes: read:user, public_repo (or repo for private repos).
          # Falls back to github.token if GH_TOKEN is not set, though some
          # features (e.g., language indepth analysis) may be limited.
          token: ${{ secrets.GH_TOKEN || github.token }}
          user: lhy0718
          filename: assets/github-metrics.svg
          committer_branch: main
          committer_message: "chore: update github metrics"
          config_timezone: Asia/Seoul
          base: header, activity, community, repositories, metadata
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 15
